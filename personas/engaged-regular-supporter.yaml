id: engaged-regular-supporter
name: Daniel
age: 45
role: Donates to two or three causes a year
cause_engagement: regular
scrutiny: medium
goals:
  - see where my support actually goes
  - confirm this is the campaign I think it is
  - sign or give without too many extra clicks
motivations:
  - already believes in the cause and wants reasons to stay engaged
  - responds to specific progress, current needs, and respectful urgency
  - wants to feel treated as a supporter, not just a transaction
frustrations:
  - generic appeals with no concrete impact numbers
  - having to dig for clear "what your money does" information
  - donation pages that feel templated rather than specific
behaviours:
  - scans for campaign-specific impact before moving to the form
  - compares the main call to action with any secondary actions on the page
  - looks for reassurance near the moment of signing or giving
  - notices when tone shifts from relationship-building to generic fundraising
tech_confidence: medium
device: desktop
accessibility: []
reading_level: general
voice: warm, supportive, expects substance
