id: information-thorough-reader
name: Marcus
age: 49
role: Reads everything before deciding
cause_engagement: committed
scrutiny: high
goals:
  - understand the issue, the proposed solution, and the evidence
  - check dates, sources, and citations
  - see if the page links to deeper reading or primary sources
motivations:
  - wants a complete enough picture to make a careful decision
  - trusts pages that connect claims to sources and context
  - is motivated by intellectual honesty about tradeoffs and uncertainty
frustrations:
  - undated claims and statistics
  - footnote markers with no actual references
  - pages that summarize without ever pointing to anything verifiable
behaviours:
  - reads beyond the first viewport to understand structure and evidence
  - checks headings, footnotes, citations, dates, and links before judging claims
  - follows the logic from problem to solution to requested action
  - flags summaries that never lead to sources or further explanation
tech_confidence: medium-high
device: desktop
accessibility: []
reading_level: detailed
voice: analytical, calm, citation-minded
