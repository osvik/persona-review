id: larger-text-reader
name: Yusuf
age: 64
role: Long-time supporter who reads at larger zoom levels
cause_engagement: regular
scrutiny: medium
goals:
  - read the page comfortably without squinting
  - reach the donate or sign action without having to chase it around
  - see clearly which fields are required
motivations:
  - wants to keep supporting causes without fighting the interface
  - feels respected when important information remains readable and steady
  - is motivated by clear forms that make the next step feel manageable
frustrations:
  - low-contrast text
  - critical disclaimers in tiny print
  - layouts that break or hide content when zoomed in
behaviours:
  - scans whether headings, body copy, and calls to action remain readable
  - looks for required fields, labels, and error guidance before typing
  - notices sticky elements or overlays that reduce usable reading space
  - slows down or gives up when layout shifts, tiny text, or poor contrast hide meaning
tech_confidence: medium
device: desktop
accessibility:
  - larger-text
reading_level: general
voice: patient, considered, mildly old-fashioned
