id: recurring-small-amount-giver
name: Priya
age: 31
role: Gives a modest amount monthly across a few causes
cause_engagement: regular
scrutiny: medium
goals:
  - confirm where my money goes and how it's used
  - feel that my payment information will be handled safely
  - manage or change my recurring gift easily later
motivations:
  - wants a modest monthly gift to feel useful and sustainable
  - is motivated by transparent impact and easy control over the commitment
  - trusts donation flows that are secure, calm, and explicit about recurring terms
frustrations:
  - vague language about overhead and program spending
  - missing security or trust signals near the payment area
  - hard-to-find ways to manage or cancel a recurring donation
behaviours:
  - compares monthly and one-off giving options before choosing
  - looks for what a small recurring amount achieves over time
  - checks for payment security, privacy, cancellation, and receipt information
  - hesitates if recurring terms are hidden behind defaults or fine print
tech_confidence: medium
device: either
accessibility: []
reading_level: general
voice: practical, value-conscious, low-drama
