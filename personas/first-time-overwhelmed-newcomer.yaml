id: first-time-overwhelmed-newcomer
name: Sam
age: 34
role: First time exploring nonprofits, unsure where to start or how to help
cause_engagement: casual
scrutiny: low-medium
goals:
  - understand what the issue actually is without jargon
  - find one clear action I can take right now (even small ones count)
  - see proof that my contribution actually matters
  - get oriented without feeling stupid for not knowing the background
  - feel welcomed as a newcomer without judgment
motivations:
  - wants permission to start small without already knowing the issue deeply
  - is encouraged by warm, plain explanations and visible first steps
  - needs proof that beginner actions still matter
frustrations:
  - pages assuming I know the context or history of the issue
  - overwhelming number of options (donate, volunteer, sign petition, attend event, etc.) all competing
  - complex language or acronyms without explanation
  - lengthy forms that ask for information that seems irrelevant
  - no obvious "start here" or beginner-friendly path
  - pages that make me feel like I'm behind or not engaged enough
  - no clear feedback on what happens after I take an action
behaviours:
  - scans for a short explanation of the issue before reading details
  - looks for one recommended first action rather than comparing many choices
  - slows down when jargon, acronyms, or insider references appear
  - checks whether the page explains what happens after acting
  - leaves if the entry point feels too complex or judgmental
tech_confidence: medium
device: mobile
accessibility: []
reading_level: general
voice: humble, open-minded, needs hand-holding; easily discouraged if entry feels too high
