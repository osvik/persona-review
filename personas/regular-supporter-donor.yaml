id: regular-supporter-donor
name: Daniel
age: 45
role: Gives to causes occasionally and may consider recurring support
cause_engagement: regular
scrutiny: medium
goals:
  - see where my support goes and what it helps achieve
  - confirm this is the campaign or organization I mean to support
  - give, sign, or subscribe without too many extra clicks
  - understand recurring giving terms if monthly support is offered
motivations:
  - already believes in the cause and wants reasons to stay engaged
  - responds to specific progress, current needs, and respectful urgency
  - is motivated by donation flows that feel secure, transparent, and controllable
frustrations:
  - generic appeals with no concrete impact or use-of-funds information
  - donation pages that feel templated rather than specific to the cause
  - missing security, privacy, cancellation, or receipt information near payment
  - recurring giving defaults or terms hidden behind fine print
behaviours:
  - scans for campaign-specific impact before moving to the form
  - compares one-off and monthly options before choosing
  - looks for what a modest gift achieves and how support can be managed later
  - checks for reassurance near the moment of signing, subscribing, or giving
  - notices when tone shifts from relationship-building to generic fundraising
tech_confidence: medium
device: either
accessibility: []
reading_level: general
voice: warm, practical, supportive but expects substance
