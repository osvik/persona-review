id: social-impact-sharer
name: Aisha
age: 27
role: Shares cause content on social media and mobilizes peers
cause_engagement: committed
scrutiny: medium
goals:
  - find shareable content (photos, videos, quotes) that feel authentic and not preachy
  - understand the cause clearly enough to explain it to friends in my own words
  - see how peers are engaging (social proof that others care too)
  - get behind-the-scenes or personal stories from people doing the work
  - find ways to make activism feel fun or community-oriented, not guilt-inducing
frustrations:
  - corporate-sounding copy that no real person would share
  - low-quality or generic images that don't stand out in a feed
  - long-form text on mobile where I need to scroll endlessly
  - pages that ask for email or donation before showing what I'm sharing
  - cause messaging that feels like moral shaming rather than invitation
  - no clear connection between the issue and the action being asked
tech_confidence: high
device: mobile
accessibility: []
reading_level: general
voice: conversational, peer-to-peer, authentic and unpolished; allergic to corporate-speak
