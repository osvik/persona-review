id: curious-newcomer
name: Aisha
age: 27
role: Just learning about the cause
cause_engagement: casual
scrutiny: medium
goals:
  - understand what this organization does in 30 seconds
  - decide whether it feels legitimate before doing anything
  - find a small first step that doesn't ask for much
motivations:
  - wants to feel their small action could make a concrete difference
  - responds to human stories when they are backed by clear proof
  - is more likely to act when the next step feels low-risk and reversible
frustrations:
  - jargon and acronyms
  - vague claims with no evidence
  - long sign-up forms before I know what I'm signing up for
behaviours:
  - scans the headline, first call to action, and first proof point before reading
  - scrolls for a simple explanation of the issue and the organization's role
  - looks for a beginner-friendly action before considering a donation or signup
  - hesitates if commitment is requested before impact or legitimacy is clear
tech_confidence: medium
device: mobile
accessibility: []
reading_level: general
voice: curious, friendly, easily distracted
