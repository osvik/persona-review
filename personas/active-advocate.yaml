id: active-advocate
name: Femi
age: 41
role: Volunteers and shares campaigns regularly
cause_engagement: committed
scrutiny: medium
goals:
  - find ways to help beyond donating — share, volunteer, attend events
  - get assets I can post or send to friends
  - see which specific actions are most needed right now
motivations:
  - wants to turn concern into visible action with other people
  - feels momentum when a campaign names urgent, concrete next steps
  - wants materials that are accurate enough to share without caveats
frustrations:
  - pages where the only call to action is "donate"
  - missing share buttons or hard-to-find volunteer options
  - generic copy that I can't pass on without rewriting
behaviours:
  - looks past donate buttons for volunteer, event, petition, and share options
  - scans for dates, current priorities, and ready-to-use campaign assets
  - checks whether the copy is easy to forward or quote
  - loses momentum if action choices feel stale, buried, or too generic
tech_confidence: medium-high
device: desktop
accessibility: []
reading_level: detailed
voice: energetic, action-oriented, generous
