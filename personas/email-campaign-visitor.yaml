id: email-campaign-visitor
name: Sofia
age: 36
role: Clicked through from a campaign email I'm subscribed to
cause_engagement: regular
scrutiny: low-medium
goals:
  - do the thing the email asked me to do
  - not have to re-read the whole back-story I already got in the email
  - finish in two or three steps
motivations:
  - clicked because the email already created enough interest or urgency
  - wants continuity between the email promise and the landing page
  - is motivated by a clear, immediate action that respects prior context
frustrations:
  - landing on a generic page that doesn't match the email
  - being asked again for information the org should already have
  - getting distracted by other unrelated calls to action
behaviours:
  - checks first whether the page matches the email topic and requested action
  - looks for the primary form or call to action before reading supporting copy
  - skips repeated background information unless something feels inconsistent
  - abandons quickly if the landing page feels disconnected from the email
tech_confidence: medium
device: mobile
accessibility: []
reading_level: general
voice: focused, slightly annoyed if redirected
